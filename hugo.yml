baseURL: "https://bi3mer.github.io/"
languageCode: "en-us"
title: "Colan Biemer"
theme: "PaperMod"

params:
  author: Colan Biemer
  ShowShareButtons: true
  ShowReadingTime: true
  ShowBreadCrumbs: true
  math: true

menu:
  main:
    - identifier: games
      name: Games
      url: /games/
      weight: 10
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 20
    - identifier: publications
      name: Publications
      url: /publications
      weight: 30
    - identifier: problems
      name: Problems
      url: /problems/
      weight: 40
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 50
    - identifier: search
      name: Search
      url: /search/
      weight: 60

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
    extensions:
      footnote: true
      passthrough:
        delimiters:
          block:
            - - \[
              - \]
            - - $$
              - $$
          inline:
            - - \(
              - \)
        enable: true
